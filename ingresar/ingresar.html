<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ef6746560c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/ingresarStyles-dist.css">
    <title>Iniciar sesión</title>
</head>
<body>
    <header class="header">
        <div class="header__logo">
            <img src="/assets/icons/logo-villadelparque.png" alt="Logo villa del parque">
        </div>

        <nav class="header__nav">
            <ol class="header__navbar">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/sZc/solicitudesZonasComunes.html">Solucitudes zonas comunes</a></li>
                <li><a href="/pqr/PQR.html">PQR</a></li>
                <li><a href="/ingresar/ingresar.html" class="active">Ingresar</a></li>
            </ol>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="form__title">
                <h1>Formulario de Registro</h1>
            </div>

            <form action="">
                <div class="name">
                    <label for="name">Nombre:</label>
                    <input class="inputText" type="text" name="name" placeholder="Escriba su nombre" id="name" required>
                </div>

                <div class="lastName">
                    <label for="lastName">Apellidos:</label>
                    <input class="inputText" type="text" name="lastName" placeholder="Escriba su apellido" id="lastName" required>
                </div>

                <div class="email">
                    <label for="email">Correo:</label>
                    <input class="inputText" type="email" name="email" placeholder="Escriba su correo" id="email" required>
                </div>

                <div class="password">
                    <label for="password">Contraseña:</label>
                    <input class="inputText" type="password" name="password" placeholder="Escriba su contraseña" id="password" required>
                </div>

                <div class="confirmPassword">
                    <label for="confirmPassword">Confirme su contraseña:</label>
                    <input class="inputText" type="password" name="confirmPassword" placeholder="Confirme su contraseña" id="confirmPassword" required>
                </div>

                <div class="terminosCondiciones">
                    <input class="inputCheck" type="checkbox" name="terminosYCondiciones" id="aceptar" required>
                    <label for="aceptar">Estoy de acuerdo con los <a href="#">Terminos y Condiciones</a></label>
                </div>

                <div class="submit">
                    <input class="boton" type="submit" value="Registrarse" name="registrarse">
                </div>
            </form>

            <div class="form__ingresar">
                <a href="#">Ya tengo cuenta</a>
            </div>
        </div>
    </main>
</body>
</html>
