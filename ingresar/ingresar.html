<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ef6746560c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/ingresarStyles-dist.css">
    <title>Iniciar sesión</title>
</head>
<body>
    <header class="header">
        <div class="header__logo">
            <img src="/assets/icons/logo-villadelparque.png" alt="Logo villa del parque">
        </div>

        <nav class="header__nav">
            <ol class="header__navbar">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/sZc/solicitudesZonasComunes.html">Solucitudes zonas comunes</a></li>
                <li><a href="/pqr/PQR.html">PQR</a></li>
                <li><a href="/ingresar/ingresar.html" class="active">Ingresar</a></li>
            </ol>
        </nav>
    </header>

    <main>
        <div class="containerForm sign-in">
            <form action="" class="form1" id="formSignIn">
                <div class="form__title">
                    <h1>Iniciar Sesión</h1>
                </div>
                <div class="form__email">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="Ej: tucorreo@gmail.com">
                </div>
                <div class="form__password">
                    <label for="password">Contraseña: </label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                </div>
                <div class="form__login">
                    <input type="submit" value="Iniciar Sesión">
                </div>
                <div class="form__footer">
                    <p>¿Aún no tienes una cuenta? <a href="#">Registrarse</a></p>
                </div>
            </form>
        </div>

        <div class="containerForm sign-up">
            <form action="" class="form2" id="formSingUp">
                <div class="form__title">
                    <h1>Registrarse</h1>
                </div>
                <div class="form__name">
                    <label for="name">Nombre: </label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form__phone">
                    <label for="tel">Número de teléfono: </label>
                    <input type="number" id="tel" name="tel">
                </div>
                <div class="form__email">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="Ej: tucorreo@gmail.com" name="email">
                </div>
                <div class="form__password">
                    <label for="password">Contraseña: </label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" name="password">
                </div>
                <div class="form__login">
                    <input type="submit" value="Iniciar Sesión" name="submit">
                </div>
                <div class="form__footer">
                    <p>¿Ya tienes una cuenta? <a href="#">Iniciar Sesión</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="js/ingreso.js"></script>
</body>
</html>
